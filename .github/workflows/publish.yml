name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Bump beyond latest published version
        run: |
          LATEST=$(npm view servusai version 2>/dev/null || echo "0.0.0")
          echo "Latest on npm: $LATEST"
          npm version "$LATEST" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version

      - run: npm run build

      - run: npm publish --access public
